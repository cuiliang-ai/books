name: Deploy Books to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create output directory
        run: mkdir -p output

      - name: Build mdBook projects
        run: |
          for dir in */; do
            if [ -f "${dir}book.toml" ]; then
              echo "Building mdBook: ${dir}..."
              mdbook build "${dir}" --dest-dir "$(pwd)/output/${dir%/}"
            fi
          done

      - name: Build Astro projects
        run: |
          for dir in */; do
            if [ -f "${dir}astro.config.mjs" ] && [ -f "${dir}package.json" ]; then
              echo "Building Astro: ${dir}..."
              cd "${dir}"
              npm ci
              npm run build
              cp -r dist/* "../output/${dir%/}/" 2>/dev/null || mkdir -p "../output/${dir%/}" && cp -r dist/* "../output/${dir%/}/"
              cd ..
            fi
          done

      - name: Copy index page
        run: cp index.html output/

      - name: Copy CNAME (if exists)
        run: test -f CNAME && cp CNAME output/ || echo "No CNAME file, skipping"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
