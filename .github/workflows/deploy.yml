name: Deploy Books to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install mdbook-mermaid
        run: |
          curl -sL -o mdbook-mermaid.tar.gz https://github.com/badboy/mdbook-mermaid/releases/download/v0.17.0/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-gnu.tar.gz
          tar xzf mdbook-mermaid.tar.gz
          chmod +x mdbook-mermaid
          mv mdbook-mermaid /usr/local/bin/

      - name: Create output directory
        run: mkdir -p output

      - name: Build all books
        run: |
          for dir in */; do
            if [ -f "${dir}book.toml" ]; then
              echo "Building ${dir}..."
              mdbook build "${dir}" --dest-dir "$(pwd)/output/${dir%/}"
            fi
          done

      - name: Copy index page
        run: cp index.html output/

      - name: Copy CNAME (if exists)
        run: test -f CNAME && cp CNAME output/ || echo "No CNAME file, skipping"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
