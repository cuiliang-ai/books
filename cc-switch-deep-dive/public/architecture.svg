<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', 'PingFang SC', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="trayGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rustGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="ssotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="liveGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="proxyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="46" fill="#e2e8f0" font-size="26" font-weight="700" text-anchor="middle">cc-switch 架构总览</text>
  <text x="600" y="72" fill="#94a3b8" font-size="14" text-anchor="middle">Tauri 2 · React 18 · Rust · SQLite · 本地代理</text>

  <!-- Desktop outer frame -->
  <rect x="30" y="95" width="1140" height="625" rx="14" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="50" y="118" fill="#64748b" font-size="13" font-weight="600">用户桌面  · macOS / Windows / Linux</text>

  <!-- Front-end row: UI + Tray -->
  <g filter="url(#softShadow)">
    <rect x="80" y="140" width="320" height="80" rx="10" fill="url(#uiGrad)"/>
    <text x="240" y="170" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">cc-switch UI</text>
    <text x="240" y="194" fill="#e0f2fe" font-size="12" text-anchor="middle">React 18 + TanStack Query + shadcn/ui</text>
    <text x="240" y="210" fill="#e0f2fe" font-size="11" text-anchor="middle">WebView (Tauri 2)</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="800" y="140" width="320" height="80" rx="10" fill="url(#trayGrad)"/>
    <text x="960" y="170" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">系统托盘</text>
    <text x="960" y="194" fill="#ede9fe" font-size="12" text-anchor="middle">MenuItem · 快速切换 Provider</text>
    <text x="960" y="210" fill="#ede9fe" font-size="11" text-anchor="middle">tray.rs</text>
  </g>

  <!-- IPC arrows to Rust -->
  <line x1="240" y1="220" x2="240" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="252" y="245" fill="#94a3b8" font-size="11">IPC · invoke()</text>
  <line x1="960" y1="220" x2="960" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="972" y="245" fill="#94a3b8" font-size="11">MenuItem click</text>

  <!-- Rust backend container -->
  <g filter="url(#softShadow)">
    <rect x="80" y="265" width="1040" height="360" rx="12" fill="url(#rustGrad)" opacity="0.96"/>
    <text x="100" y="290" fill="#fff" font-size="16" font-weight="700">Rust 后端 · Tauri 2</text>
    <text x="100" y="308" fill="#ffedd5" font-size="11">commands/ → services/ → database/</text>
  </g>

  <!-- Commands / Services / DB pill -->
  <g>
    <rect x="110" y="325" width="300" height="44" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
    <text x="260" y="352" fill="#fde68a" font-size="13" font-weight="600" text-anchor="middle">Commands  →  Services  →  SQLite</text>
  </g>

  <!-- SSOT card -->
  <g filter="url(#softShadow)">
    <rect x="110" y="385" width="440" height="100" rx="10" fill="url(#ssotGrad)"/>
    <text x="330" y="411" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">SSOT · 单一数据源</text>
    <text x="330" y="434" fill="#d1fae5" font-size="12" text-anchor="middle">~/.cc-switch/config.json  (MultiAppConfig)</text>
    <text x="330" y="452" fill="#d1fae5" font-size="12" text-anchor="middle">~/.cc-switch/cc-switch.db  (热数据 · 索引 · 统计)</text>
    <text x="330" y="471" fill="#a7f3d0" font-size="11" text-anchor="middle">Provider · MCP · Skill · Usage · Proxy Cfg</text>
  </g>

  <!-- Arrow SSOT -> Live (atomic_write) -->
  <line x1="550" y1="435" x2="620" y2="435" stroke="#34d399" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
  <text x="585" y="425" fill="#34d399" font-size="11" text-anchor="middle" font-weight="600">atomic_write</text>
  <text x="585" y="448" fill="#6ee7b7" font-size="10" text-anchor="middle">temp + rename</text>

  <!-- Live configs card -->
  <g filter="url(#softShadow)">
    <rect x="620" y="385" width="480" height="100" rx="10" fill="url(#liveGrad)"/>
    <text x="860" y="410" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Live 配置文件</text>
    <text x="860" y="430" fill="#ccfbf1" font-size="11" text-anchor="middle">~/.claude/settings.json    ~/.codex/config.toml + auth.json</text>
    <text x="860" y="448" fill="#ccfbf1" font-size="11" text-anchor="middle">~/.gemini/settings.json    ~/.config/opencode/...</text>
    <text x="860" y="466" fill="#ccfbf1" font-size="11" text-anchor="middle">~/.openclaw/...</text>
  </g>

  <!-- Proxy card -->
  <g filter="url(#softShadow)">
    <rect x="110" y="505" width="990" height="105" rx="10" fill="url(#proxyGrad)" opacity="0.95"/>
    <text x="130" y="530" fill="#fff" font-size="15" font-weight="700">本地代理 (可选) · 127.0.0.1:PORT</text>
    <text x="130" y="549" fill="#fee2e2" font-size="11">Axum 0.7 + Hyper 1.0 + rustls · 保留 header casing</text>
    <!-- inner pills -->
    <g font-size="11" font-weight="600" text-anchor="middle">
      <rect x="130" y="562" width="200" height="34" rx="17" fill="#1e293b" stroke="#fca5a5"/>
      <text x="230" y="584" fill="#fecaca">Provider Router</text>

      <rect x="345" y="562" width="180" height="34" rx="17" fill="#1e293b" stroke="#fca5a5"/>
      <text x="435" y="584" fill="#fecaca">Circuit Breaker</text>

      <rect x="540" y="562" width="180" height="34" rx="17" fill="#1e293b" stroke="#fca5a5"/>
      <text x="630" y="584" fill="#fecaca">Failover Switch</text>

      <rect x="735" y="562" width="180" height="34" rx="17" fill="#1e293b" stroke="#fca5a5"/>
      <text x="825" y="584" fill="#fecaca">SSE 流转 + 矫正</text>

      <rect x="930" y="562" width="155" height="34" rx="17" fill="#1e293b" stroke="#fca5a5"/>
      <text x="1007" y="584" fill="#fecaca">协议适配器</text>
    </g>
  </g>

  <!-- CLI row -->
  <g filter="url(#softShadow)">
    <rect x="120" y="650" width="170" height="60" rx="10" fill="url(#cliGrad)"/>
    <text x="205" y="675" fill="#1f1300" font-size="14" font-weight="700" text-anchor="middle">Claude CLI</text>
    <text x="205" y="695" fill="#422f00" font-size="11" text-anchor="middle">~/.claude/*</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="310" y="650" width="170" height="60" rx="10" fill="url(#cliGrad)"/>
    <text x="395" y="675" fill="#1f1300" font-size="14" font-weight="700" text-anchor="middle">Codex CLI</text>
    <text x="395" y="695" fill="#422f00" font-size="11" text-anchor="middle">~/.codex/*</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="500" y="650" width="170" height="60" rx="10" fill="url(#cliGrad)"/>
    <text x="585" y="675" fill="#1f1300" font-size="14" font-weight="700" text-anchor="middle">Gemini CLI</text>
    <text x="585" y="695" fill="#422f00" font-size="11" text-anchor="middle">~/.gemini/*</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="690" y="650" width="170" height="60" rx="10" fill="url(#cliGrad)"/>
    <text x="775" y="675" fill="#1f1300" font-size="14" font-weight="700" text-anchor="middle">OpenCode</text>
    <text x="775" y="695" fill="#422f00" font-size="11" text-anchor="middle">~/.config/opencode</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="880" y="650" width="170" height="60" rx="10" fill="url(#cliGrad)"/>
    <text x="965" y="675" fill="#1f1300" font-size="14" font-weight="700" text-anchor="middle">OpenClaw</text>
    <text x="965" y="695" fill="#422f00" font-size="11" text-anchor="middle">~/.openclaw/*</text>
  </g>

  <!-- Arrows: CLIs go up into Proxy (dashed = 经代理) -->
  <line x1="205" y1="650" x2="205" y2="615" stroke="#f87171" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowRed)"/>
  <line x1="395" y1="650" x2="395" y2="615" stroke="#f87171" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowRed)"/>
  <line x1="585" y1="650" x2="585" y2="615" stroke="#f87171" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowRed)"/>
  <line x1="775" y1="650" x2="775" y2="615" stroke="#f87171" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowRed)"/>
  <line x1="965" y1="650" x2="965" y2="615" stroke="#f87171" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowRed)"/>

  <!-- Live configs -> CLIs (solid = 直连模式读取配置) -->
  <path d="M 860 485 C 860 600, 500 610, 480 650" stroke="#5eead4" stroke-width="2" fill="none" stroke-dasharray="2 3"/>

  <!-- HTTPS out to LLM -->
  <line x1="600" y1="720" x2="600" y2="770" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="616" y="750" fill="#94a3b8" font-size="12">HTTPS</text>

  <g filter="url(#softShadow)">
    <rect x="330" y="775" width="540" height="90" rx="12" fill="url(#llmGrad)"/>
    <text x="600" y="805" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">LLM Providers</text>
    <text x="600" y="826" fill="#fce7f3" font-size="12" text-anchor="middle">Anthropic · OpenAI · Google · DeepSeek · Moonshot · ...</text>
    <text x="600" y="846" fill="#fbcfe8" font-size="11" text-anchor="middle">50+ 预设 · Universal Provider</text>
  </g>

  <!-- Legend -->
  <g font-size="11">
    <rect x="860" y="300" width="245" height="78" rx="8" fill="#0f172a" stroke="#334155"/>
    <text x="872" y="318" fill="#e2e8f0" font-weight="600">图例</text>

    <line x1="872" y1="332" x2="895" y2="332" stroke="#34d399" stroke-width="2.4"/>
    <text x="902" y="336" fill="#94a3b8">atomic_write</text>

    <line x1="872" y1="350" x2="895" y2="350" stroke="#f87171" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="902" y="354" fill="#94a3b8">CLI → 代理请求</text>

    <line x1="872" y1="368" x2="895" y2="368" stroke="#5eead4" stroke-width="2" stroke-dasharray="2 3"/>
    <text x="902" y="372" fill="#94a3b8">直连模式读配置</text>
  </g>
</svg>
